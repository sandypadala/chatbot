<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GenAI Chat</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #0f172a;
        color: #f8fafc;
      }
      .container {
        max-width: 760px;
        margin: 40px auto;
        padding: 20px;
        background: #111827;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      }
      h1 { margin-top: 0; }
      #messages {
        height: 420px;
        overflow-y: auto;
        padding: 12px;
        background: #1f2937;
        border-radius: 12px;
        margin-bottom: 12px;
      }
      .msg { margin-bottom: 10px; padding: 10px 12px; border-radius: 10px; }
      .user { background: #2563eb; align-self: flex-end; }
      .assistant { background: #374151; }
      form { display: flex; gap: 10px; }
      input { flex: 1; padding: 12px; border-radius: 8px; border: none; }
      button { padding: 12px 16px; border: none; border-radius: 8px; background: #10b981; color: white; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>GenAI Chat</h1>
      <div id="messages"></div>
      <form id="chatForm">
        <input id="message" placeholder="Type your message..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </div>

    <script>
      const form = document.getElementById('chatForm');
      const input = document.getElementById('message');
      const messages = document.getElementById('messages');

      function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        addMessage('user', text);
        input.value = '';

        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
          });

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.detail || 'The request failed.');
          }

          const data = await response.json();
          addMessage('assistant', data.reply);
        } catch (err) {
          addMessage('assistant', err.message || 'Sorry, the backend is unavailable.');
        }
      });
    </script>
  </body>
</html>
